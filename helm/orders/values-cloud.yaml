# Override для облачного k3s (Фаза 1): один узел, без Vault, публичный образ.
vault:
  enabled: false
app:
  replicas: 1
  image:
    pullSecret: ""      # GHCR-пакет публичный → pull-секрет не нужен
config:
  DEBUG: "False"
  ALLOWED_HOSTS: "*"
  DB_HOST: "db"
  DB_PORT: "5432"
  DB_NAME: "orders_db"
  DB_USER: "orders_user"
ingress:
  enabled: true
  # host задаётся из wrapper: --set ingress.host=<ip>.sslip.io
  tls:
    enabled: true
    # staging: надёжно (свой большой лимит), но сертификат не доверенный браузером (curl -k).
    # prod даёт валидный сертификат, НО лимит LE общий на весь sslip.io (бывает исчерпан).
    # Переключение на prod: заменить на letsencrypt-prod и helm upgrade.
    clusterIssuer: letsencrypt-staging

apiVersion: v1
kind: ServiceAccount
metadata:
  name: orders-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "orders-app"
        vault.hashicorp.com/agent-init-first: "true"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/orders/app"
        vault.hashicorp.com/agent-inject-template-config: |
{{ .Files.Get "files/vault-config.tpl" | indent 10 }}
    spec:
      serviceAccountName: orders-app
      imagePullSecrets:
        - name: {{ .Values.app.image.pullSecret }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: app
      initContainers:
        - name: migrate
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          command: ["/bin/sh","-c"]
          args:
            - |
              set -a
              . /vault/secrets/config
              set +a
              exec python manage.py migrate --noinput
          envFrom:
            - configMapRef:
                name: app-config
      containers:
        - name: app
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          command: ["/bin/sh","-c"]
          args:
            - |
              set -a
              . /vault/secrets/config
              set +a
              exec gunicorn orders.wsgi:application --bind 0.0.0.0:8000 --workers 3
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: app-config
          readinessProbe:
            httpGet:
              path: /shops
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
{{ toYaml .Values.app.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: app
spec:
  selector:
    app: app
  ports:
    - port: 8000
      targetPort: 8000

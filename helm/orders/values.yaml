app:
  image:
    repository: ghcr.io/koptelof/orders-app
    tag: f25eb2b
    pullPolicy: IfNotPresent
    pullSecret: ghcr-cred
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
config:
  DEBUG: "True"
  ALLOWED_HOSTS: "*"
  DB_HOST: "db"
  DB_PORT: "5432"
  DB_NAME: "orders_db"
  DB_USER: "orders_user"
postgres:
  image: postgres:16
  storage: 2Gi
redis:
  image: redis:7-alpine
ingress:
  enabled: true
  host: ""                 # напр. 158.160.1.1.sslip.io (задаём из wrapper по IP)
  tls:
    enabled: false
    clusterIssuer: letsencrypt-prod
# Vault Agent Injector: секреты в рантайме через sidecar.
# true  — локальный кластер (Vault + injector установлены);
# false — секреты из статичного k8s Secret (existingSecrets.app) через envFrom.
vault:
  enabled: true
# имена секретов, созданных ВНЕ чарта (kubectl create secret ...)
existingSecrets:
  db: db-credentials
  app: app-secrets

---
# Облачная доводка: приложение в k3s из Helm-чарта + TLS (cert-manager, Let's Encrypt).
# Секреты (db_password, secret_key) и le_host приходят из wrapper через --extra-vars.
- name: Deploy orders on k3s (cloud)
  hosts: web
  become: true
  vars:
    repo_url: https://github.com/KopteloF/orders-devops.git
    project_dir: /opt/orders
    k8s_ns: orders
    image_tag: ""          # если задан — переопределяет тег из values.yaml
    k3s_mirror: cn         # GitHub-releases режется из ru-облака → тянем k3s с зеркала Rancher
    le_host: ""            # хост для Ingress/TLS, напр. <ip>.sslip.io
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Install base packages
      apt:
        name: [curl, git, openssl]
        state: present
        update_cache: true

    - name: Precheck — quay.io доступен (нужен для образов cert-manager)
      shell: curl -m 15 -sS -o /dev/null -w "%{http_code}" https://quay.io/v2/ || echo TIMEOUT
      register: quay_check
      changed_when: false

    - name: Fail fast если quay.io недоступен
      fail:
        msg: "quay.io недоступен (код '{{ quay_check.stdout }}') — образы cert-manager не скачаются. Нужен зеркальный реестр."
      when: not (quay_check.stdout is search('^(200|401)$'))

    - name: Install k3s (single node, через зеркало)
      shell: curl -sfL https://get.k3s.io | INSTALL_K3S_MIRROR={{ k3s_mirror }} sh -
      args:
        creates: /usr/local/bin/k3s
      register: k3s_install
      retries: 3
      delay: 10
      until: k3s_install.rc == 0

    - name: Wait for k3s node Ready
      command: k3s kubectl wait --for=condition=Ready node --all --timeout=180s
      changed_when: false

    # Ставим helm НЕ через get-helm-3 (тот тянет скрипт с raw.githubusercontent.com,
    # а GitHub-CDN режется из ru-облака; при этом `curl -f | bash` глотает ошибку —
    # код возврата берётся от bash, задача «успешна», а helm не установлен).
    # Качаем бинарь напрямую с get.helm.sh (Fastly, доступен), с pipefail и ретраями.
    - name: Install Helm (бинарь с get.helm.sh, а не GitHub-CDN)
      shell: |
        set -eo pipefail
        ver=v3.15.4
        curl -fsSL "https://get.helm.sh/helm-${ver}-linux-amd64.tar.gz" -o /tmp/helm.tgz
        tar -xzf /tmp/helm.tgz -C /tmp
        install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
      args:
        creates: /usr/local/bin/helm
        executable: /bin/bash
      register: helm_install
      retries: 3
      delay: 10
      until: helm_install.rc == 0

    - name: Clone/update project
      git:
        repo: "{{ repo_url }}"
        dest: "{{ project_dir }}"
        version: master
        force: true

    - name: Install cert-manager (из локального манифеста — обход GitHub-CDN)
      command: k3s kubectl apply -f {{ project_dir }}/deploy/cert-manager/cert-manager.yaml
      register: cm_apply
      changed_when: "'created' in cm_apply.stdout or 'configured' in cm_apply.stdout"

    - name: Wait cert-manager Ready
      command: k3s kubectl -n cert-manager rollout status deploy/{{ item }} --timeout=240s
      loop:
        - cert-manager
        - cert-manager-webhook
        - cert-manager-cainjector
      changed_when: false

    - name: Apply ClusterIssuers (retry — webhook admission поднимается не мгновенно)
      command: k3s kubectl apply -f {{ project_dir }}/deploy/cert-manager/cluster-issuers.yaml
      register: issuer_apply
      retries: 6
      delay: 10
      until: issuer_apply.rc == 0
      changed_when: "'created' in issuer_apply.stdout or 'configured' in issuer_apply.stdout"

    - name: Ensure namespace
      shell: |
        k3s kubectl create namespace {{ k8s_ns }} --dry-run=client -o yaml | k3s kubectl apply -f -
      changed_when: false

    - name: Create/update db-credentials secret
      shell: |
        k3s kubectl -n {{ k8s_ns }} create secret generic db-credentials \
          --from-literal=POSTGRES_DB=orders_db \
          --from-literal=POSTGRES_USER=orders_user \
          --from-literal=POSTGRES_PASSWORD='{{ db_password }}' \
          --dry-run=client -o yaml | k3s kubectl apply -f -
      changed_when: false
      no_log: true

    - name: Create/update app-secrets secret
      shell: |
        k3s kubectl -n {{ k8s_ns }} create secret generic app-secrets \
          --from-literal=SECRET_KEY='{{ secret_key }}' \
          --from-literal=DB_PASSWORD='{{ db_password }}' \
          --dry-run=client -o yaml | k3s kubectl apply -f -
      changed_when: false
      no_log: true

    - name: Helm deploy (values-cloud, vault disabled, TLS via cert-manager)
      shell: >
        helm upgrade --install orders {{ project_dir }}/helm/orders
        -n {{ k8s_ns }}
        -f {{ project_dir }}/helm/orders/values-cloud.yaml
        --set ingress.host={{ le_host }}
        {{ ('--set app.image.tag=' + image_tag) if (image_tag | length > 0) else '' }}
        --wait --timeout 8m

    - name: Wait for TLS certificate Ready (LE выпускает асинхронно)
      command: k3s kubectl -n {{ k8s_ns }} wait --for=condition=Ready certificate/app-tls --timeout=240s
      register: cert_ready
      changed_when: false
      failed_when: false

    - name: Статус сертификата/challenge
      command: k3s kubectl -n {{ k8s_ns }} get certificate,order,challenge
      changed_when: false
      register: cert_status

    - name: Итог
      debug:
        msg: "{{ cert_status.stdout_lines }}"

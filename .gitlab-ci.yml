stages:
  - lint
  - test
  - build
variables:
  SECRET_KEY: ci-secret-key-not-for-prod
  DEBUG: "True"
  ALLOWED_HOSTS: "127.0.0.1,localhost"
  DB_NAME: orders_db
  DB_USER: orders_user
  DB_PASSWORD: orders_pass
  DB_HOST: postgres
  DB_PORT: "5432"
  POSTGRES_DB: orders_db
  POSTGRES_USER: orders_user
  POSTGRES_PASSWORD: orders_pass
lint:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install flake8
    - flake8 orders
test:
  stage: test
  image: python:3.12-slim
  services:
    - postgres:16
  script:
    - pip install -r requirements.txt
    - cd orders
    - pytest --cov=api --cov-report=term-missing
build:
  stage: build
  image: docker:27
  script:
    - docker build -t orders-app .

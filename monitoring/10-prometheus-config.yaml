apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      scrape_timeout: 10s
    rule_files:
      - /etc/prometheus/alerts.yml
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_node_name]
            action: replace
            target_label: node
  alerts.yml: |
    groups:
      - name: orders-app
        rules:
          - alert: OrdersAppDown
            expr: absent(up{namespace="orders"} == 1)
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Django-приложение недоступно"
              description: "Нет ни одной живой реплики app в namespace orders более 1 минуты"

          - alert: OrdersHighLatency
            expr: histogram_quantile(0.95, sum by (le) (rate(django_http_requests_latency_seconds_by_view_method_bucket[5m]))) > 0.5
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Высокая латентность приложения"
              description: "p95 времени ответа выше 0.5с более 2 минут"

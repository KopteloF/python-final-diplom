apiVersion: v1
kind: Pod
metadata:
  name: vault-demo
  namespace: orders
spec:
  serviceAccountName: vault-demo
  nodeSelector:
    kubernetes.io/hostname: controlnode-virtualbox
  containers:
    - name: demo
      image: hashicorp/vault:1.17
      command: ["sh","-c","sleep 3600"]
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

name: CI
on:
  push:
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install flake8
      - run: flake8 orders
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: orders_db
          POSTGRES_USER: orders_user
          POSTGRES_PASSWORD: orders_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ci-secret-key-not-for-prod
      DEBUG: "True"
      ALLOWED_HOSTS: 127.0.0.1,localhost
      DB_NAME: orders_db
      DB_USER: orders_user
      DB_PASSWORD: orders_pass
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: pytest --cov=api --cov-report=term-missing
        working-directory: orders
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t orders-app .
